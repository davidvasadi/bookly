# Nginx proxy config for Bookly
# Helyezze el: /etc/nginx/sites-available/bookly
# ln -s /etc/nginx/sites-available/bookly /etc/nginx/sites-enabled/bookly
# nginx -t && systemctl reload nginx

upstream bookly_backend {
  server localhost:3000;
}

# Redirect HTTP to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name davelopment.hu www.davelopment.hu;
  
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }
  
  location / {
    return 301 https://$server_name$request_uri;
  }
}

# HTTPS server
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name davelopment.hu www.davelopment.hu;
  
  # SSL certificates (Let's Encrypt)
  ssl_certificate /etc/letsencrypt/live/davelopment.hu/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/davelopment.hu/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  
  # Logger
  access_log /var/log/nginx/bookly-access.log;
  error_log /var/log/nginx/bookly-error.log;
  
  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
  
  # Static files (Next.js)
  location /_next/static {
    proxy_pass http://bookly_backend;
    proxy_cache_valid 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }
  
  # Public files
  location /public {
    alias /var/www/bookly/public;
    expires 7d;
  }
  
  # Bookly app
  location /bookly {
    proxy_pass http://bookly_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
  
  # API
  location /api {
    proxy_pass http://bookly_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  
  # Root redirect to main site vagy Bookly
  location = / {
    proxy_pass http://bookly_backend;
    proxy_set_header Host $host;
  }
}
